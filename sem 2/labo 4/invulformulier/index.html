<!DOCTYPE html>
<html lang="nl" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/style.css">
    <script type="text/javascript" charset="utf-8"
            src="scripts/code.js"></script>
    <title>invulform</title>
</head>
<body>
<form method="get">
    <label for="first_name">First name*:</label><input type="text" placeholder="Your first name" name="first_name" id="first_name" required autofocus/><br>
    <label for="last_name">Last name*:</label><input type="text" placeholder="Your last name" name="last_name" id="last_name" required/><br>
    <p>Wich sport do you train?</p>
    <label for="running">Running</label> <input type="checkbox" name="running" id="running" value="running" /><br>
    <label for="swimming">Swimming</label> <input type="checkbox" name="swimming" id="swimming" value="swimming" /><br>
    <label for="rowing">Rowing</label> <input type="checkbox" name="rowing" id="rowing" value="rowing" />
    <p>What is your gender?</p>
    <input type="radio" value="Male" name="gender" id="male"><label for="male">Male</label><br>
    <input type="radio" value="Female" name="gender" id="female"><label for="female">Female</label><br>
    <label for="movie">Favorite movie:</label><input type="text" name="movie" id="movie"><br>
    <label for="quote">Favorite quote:</label><input type="text" size="21px" name="quote" id="quote" placeholder="Write your favorite quote"><br>
    <label for="password">Password*:</label><input type="password" name="password" id="password" required><br>
    <label for="food">Favorite food:</label>
    <select id="food">
        <option value="Hamburger" name="Hamburger">Hamburger</option>
        <option value="Pasta" name="Pasta">Pasta</option>
        <option value="Pizza" name="Pizza">Pizza</option>
    </select></br>
    <input type="file"><br/>
    <label for="email">Email adress:</label><input type="text" name="email" id="email" placeholder="Enter your email adress"><br>
    <label for="site">Favorite site:</label><input type="text" name="site" id="site" placeholder="Enter the URL of your favorite site"><br>
    <label for="number1-10">Favorite number between 1-10:</label><input type="number" min="1" max="10" id="number1-10" name="number1-10"><br>
    <label for="number1-1000">Favorite number between 1-1000:</label><input type="range" min="1" max="1000" id="number1-1000" name="number1-1000"><br>
    <label for="geboortedatum">When were you born?</label><input type="date" name="geboortedatum" id="geboortedatum"><br>
    <label for="zip">When were you born?</label><input id="zip" type="text" pattern="[0-9]{4}" placeholder="9999"><br>
    <label for="search">Search for something:</label><input type="search" id="search" name="search"><br>
    <label for="color">What is your favorite color?</label><input type="color" id="color" name="color"><br>
    <input type="submit">
</form>
</body>
</html>
